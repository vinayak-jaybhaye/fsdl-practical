<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weekly Timetable</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f4f8ff;
    }

    table {
      width: 100%;
      max-width: 1000px;
      margin: auto;
      border-collapse: collapse;
      background: #fff;
    }

    th,
    td {
      border: 1px solid #c9d6ef;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #dfeaff;
    }

    .break {
      background: #fff3d7;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1 style="text-align:center">Weekly Timetable</h1>
  <table>
    <tr>
      <th>Day</th>
      <th>9-10</th>
      <th>10-11</th>
      <th>11-12</th>
      <th>12-1</th>
      <th>1-2</th>
      <th>2-3</th>
      <th>3-4</th>
    </tr>
    <tr>
      <td>Monday</td>
      <td>Math</td>
      <td>DBMS</td>
      <td colspan="2" class="break">Lab</td>
      <td rowspan="5" class="break">Lunch</td>
      <td>OS</td>
      <td>English</td>
    </tr>
    <tr>
      <td>Tuesday</td>
      <td>Java</td>
      <td>Math</td>
      <td>FSDL</td>
      <td>FSDL</td>
      <td colspan="2">Mini Project</td>
    </tr>
    <tr>
      <td>Wednesday</td>
      <td>OS</td>
      <td>Java</td>
      <td colspan="2">DSA Lab</td>
      <td>DBMS</td>
      <td>Sports</td>
    </tr>
    <tr>
      <td>Thursday</td>
      <td>English</td>
      <td>FSDL</td>
      <td>Math</td>
      <td>Seminar</td>
      <td colspan="2">Library</td>
    </tr>
    <tr>
      <td>Friday</td>
      <td>DBMS</td>
      <td>OS</td>
      <td>Java</td>
      <td>Placement Prep</td>
      <td>FSDL</td>
      <td>Club Activity</td>
    </tr>
  </table>
</body>

</html>
