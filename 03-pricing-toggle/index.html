<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing Toggle</title>
  <style>
    body {
      font-family: 'Trebuchet MS', sans-serif;
      margin: 0;
      background: #f2f6ff;
      color: #10213f;
    }

    .wrap {
      max-width: 900px;
      margin: 24px auto;
      padding: 20px;
    }

    .toggle-box {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, .08);
    }

    .price {
      font-size: 30px;
      margin: 8px 0;
      color: #0b5db6;
    }

    .chip {
      background: #d9ecff;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Subscription Pricing</h1>
    <div class="toggle-box">
      <span>Monthly</span>
      <input id="billingToggle" type="checkbox" />
      <span>Yearly (20% off)</span>
    </div>

    <div id="cards" class="cards"></div>
  </div>

  <script>
    const plans = [
      { name: 'Basic', monthly: 9 },
      { name: 'Pro', monthly: 19 },
      { name: 'Enterprise', monthly: 49 }
    ];

    const cards = document.getElementById('cards');
    const toggle = document.getElementById('billingToggle');

    function render() {
      const yearly = toggle.checked;
      cards.innerHTML = plans.map((plan) => {
        const amount = yearly ? Math.round(plan.monthly * 12 * 0.8) : plan.monthly;
        const label = yearly ? '/year' : '/month';
        return `
          <article class="card">
            <h2>${plan.name}</h2>
            <div class="price">$${amount}<span style="font-size:16px">${label}</span></div>
            ${yearly ? '<span class="chip">Billed yearly</span>' : ''}
            <p>Includes full support and dashboard access.</p>
          </article>
        `;
      }).join('');
    }

    toggle.addEventListener('change', render);
    render();
  </script>
</body>

</html>
