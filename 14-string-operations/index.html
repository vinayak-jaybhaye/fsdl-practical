<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>String Operations</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f8f3;
    }

    .box {
      max-width: 620px;
      margin: 30px auto;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
    }

    input,
    button {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #cedbc9;
    }

    button {
      background: #278a4c;
      color: white;
      border: none;
      cursor: pointer;
    }

    .result {
      background: #f0f7ef;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>String Utility</h1>
    <input id="text" placeholder="Enter a string" />
    <button id="run">Run Operations</button>
    <div class="result" id="out"></div>
  </div>

  <script>
    document.getElementById('run').addEventListener('click', () => {
      const str = document.getElementById('text').value;
      const reversed = str.split('').reverse().join('');
      const upper = str.toUpperCase();
      const lower = str.toLowerCase();
      const length = str.length;

      document.getElementById('out').innerHTML = `
        <p><strong>Reversed:</strong> ${reversed}</p>
        <p><strong>Uppercase:</strong> ${upper}</p>
        <p><strong>Lowercase:</strong> ${lower}</p>
        <p><strong>Length:</strong> ${length}</p>
      `;
    });
  </script>
</body>

</html>
