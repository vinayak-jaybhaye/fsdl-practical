<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bar Chart - Students by Department</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7ff;
    }

    .wrap {
      max-width: 850px;
      margin: 24px auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Students by Department</h1>
    <canvas id="chart"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const ctx = document.getElementById('chart');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['CSE', 'ECE', 'EEE', 'MECH', 'CIVIL'],
        datasets: [{
          label: 'Student Count',
          data: [120, 90, 70, 65, 50],
          backgroundColor: ['#2f80ed', '#27ae60', '#f2994a', '#9b51e0', '#eb5757']
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  </script>
</body>

</html>
