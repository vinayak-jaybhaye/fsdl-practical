<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Gallery</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #101726;
      color: #fff;
    }

    .wrap {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }

    .item {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
    }

    .item img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      transition: transform .35s ease;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      display: grid;
      place-items: center;
      opacity: 0;
      transition: opacity .35s ease;
      font-weight: bold;
    }

    .item:hover img {
      transform: scale(1.12);
    }

    .item:hover .overlay {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Photo Gallery</h1>
    <div class="grid">
      <div class="item"><img src="https://picsum.photos/seed/a/600/400" alt="" />
        <div class="overlay">Nature</div>
      </div>
      <div class="item"><img src="https://picsum.photos/seed/b/600/400" alt="" />
        <div class="overlay">Travel</div>
      </div>
      <div class="item"><img src="https://picsum.photos/seed/c/600/400" alt="" />
        <div class="overlay">City</div>
      </div>
      <div class="item"><img src="https://picsum.photos/seed/d/600/400" alt="" />
        <div class="overlay">Forest</div>
      </div>
      <div class="item"><img src="https://picsum.photos/seed/e/600/400" alt="" />
        <div class="overlay">Ocean</div>
      </div>
      <div class="item"><img src="https://picsum.photos/seed/f/600/400" alt="" />
        <div class="overlay">Mountains</div>
      </div>
    </div>
  </div>
</body>

</html>
