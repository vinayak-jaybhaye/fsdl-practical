<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch App</title>
  <style>
    body {
      margin: 0;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #101928;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .box {
      text-align: center;
      background: #192338;
      padding: 24px;
      border-radius: 12px;
      width: 320px;
    }

    .time {
      font-size: 40px;
      margin: 10px 0 16px;
    }

    button {
      margin: 0 5px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
    }

    .start {
      background: #1f9e53;
    }

    .stop {
      background: #cc3d3d;
    }

    .reset {
      background: #2b74d8;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Stopwatch</h1>
    <div id="time" class="time">00:00:00</div>
    <button class="start" id="start">Start</button>
    <button class="stop" id="stop">Stop</button>
    <button class="reset" id="reset">Reset</button>
  </div>

  <script>
    let seconds = 0;
    let timer = null;

    function fmt(num) {
      return String(num).padStart(2, '0');
    }

    function render() {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      document.getElementById('time').textContent = `${fmt(h)}:${fmt(m)}:${fmt(s)}`;
    }

    document.getElementById('start').addEventListener('click', () => {
      if (timer) return;
      timer = setInterval(() => {
        seconds += 1;
        render();
      }, 1000);
    });

    document.getElementById('stop').addEventListener('click', () => {
      clearInterval(timer);
      timer = null;
    });

    document.getElementById('reset').addEventListener('click', () => {
      clearInterval(timer);
      timer = null;
      seconds = 0;
      render();
    });

    render();
  </script>
</body>

</html>
