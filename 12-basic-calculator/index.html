<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic Calculator</title>
  <style>
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: #ebf0f7;
      font-family: Arial, sans-serif;
    }

    .calc {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, .1);
    }

    input,
    select,
    button {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #cfd8ea;
    }

    button {
      background: #195ed6;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="calc">
    <h2>Calculator</h2>
    <input id="a" type="number" placeholder="First number" />
    <select id="op">
      <option value="+">Addition (+)</option>
      <option value="-">Subtraction (-)</option>
      <option value="*">Multiplication (*)</option>
      <option value="/">Division (/)</option>
    </select>
    <input id="b" type="number" placeholder="Second number" />
    <button id="run">Calculate</button>
    <h3 id="out">Result: -</h3>
  </div>

  <script>
    document.getElementById('run').addEventListener('click', () => {
      const a = Number(document.getElementById('a').value);
      const b = Number(document.getElementById('b').value);
      const op = document.getElementById('op').value;
      let ans = 0;

      if (op === '+') ans = a + b;
      if (op === '-') ans = a - b;
      if (op === '*') ans = a * b;
      if (op === '/') ans = b === 0 ? 'Cannot divide by zero' : a / b;

      document.getElementById('out').textContent = `Result: ${ans}`;
    });
  </script>
</body>

</html>
