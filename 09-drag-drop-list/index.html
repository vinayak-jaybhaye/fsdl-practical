<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drag and Drop List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f8ff;
      margin: 0;
    }

    .wrap {
      max-width: 520px;
      margin: 32px auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, .08);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #d3dcf3;
      border-radius: 8px;
      background: #fbfdff;
      cursor: grab;
    }

    li.dragging {
      opacity: .5;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Reorder Topics</h1>
    <ul id="list">
      <li draggable="true">HTML Basics</li>
      <li draggable="true">CSS Flexbox</li>
      <li draggable="true">JavaScript DOM</li>
      <li draggable="true">React Intro</li>
      <li draggable="true">Node.js API</li>
    </ul>
  </div>

  <script>
    const list = document.getElementById('list');
    let dragged = null;

    [...list.children].forEach((item) => {
      item.addEventListener('dragstart', () => {
        dragged = item;
        item.classList.add('dragging');
      });
      item.addEventListener('dragend', () => item.classList.remove('dragging'));
      item.addEventListener('dragover', (e) => e.preventDefault());
      item.addEventListener('drop', (e) => {
        e.preventDefault();
        if (dragged && dragged !== item) {
          const rect = item.getBoundingClientRect();
          const after = e.clientY > rect.top + rect.height / 2;
          list.insertBefore(dragged, after ? item.nextSibling : item);
        }
      });
    });
  </script>
</body>

</html>
