<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Profile Previewer</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #eef3f8;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px;
    }

    form,
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, .08);
    }

    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }

    input,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #cad5e6;
      border-radius: 8px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #d7e7ff;
    }

    .card {
      text-align: center;
    }

    .role {
      color: #2a5db0;
      font-weight: bold;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="grid">
    <form id="profileForm">
      <h1>Profile Form</h1>
      <label for="name">Name</label>
      <input id="name" value="Asha Verma" />

      <label for="role">Role</label>
      <input id="role" value="Frontend Developer" />

      <label for="bio">Bio</label>
      <textarea id="bio">Building useful interfaces with clear UX.</textarea>

      <label for="avatar">Avatar URL</label>
      <input id="avatar"
        value="https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?auto=format&fit=crop&w=300&q=80" />
    </form>

    <article class="card">
      <img id="previewAvatar" class="avatar" alt="avatar" />
      <h2 id="previewName"></h2>
      <div id="previewRole" class="role"></div>
      <p id="previewBio"></p>
    </article>
  </div>

  <script>
    const fields = ['name', 'role', 'bio', 'avatar'];
    const map = {
      name: 'previewName',
      role: 'previewRole',
      bio: 'previewBio'
    };

    function sync() {
      fields.forEach((id) => {
        const value = document.getElementById(id).value;
        if (id === 'avatar') {
          document.getElementById('previewAvatar').src = value || 'https://via.placeholder.com/120';
        } else {
          document.getElementById(map[id]).textContent = value;
        }
      });
    }

    document.getElementById('profileForm').addEventListener('input', sync);
    sync();
  </script>
</body>

</html>
